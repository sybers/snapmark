name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  NITRO_PRESET: vercel
  NUXT_IMAGE_PROVIDER: vercel
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  lint-test:
    uses: ./.github/workflows/lint-test.yml

  deploy:
    needs: lint-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 11.5.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24.16.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information
        run: pnpm dlx vercel@canary pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: pnpm dlx vercel@canary build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: pnpm dlx vercel@canary deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
